kind = "web"
previewPath = "/"
title = "Nirdeshika Pandey Portfolio"
version = "1.0.0"
id = "artifacts/nirdeshika-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24465
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/nirdeshika-portfolio run dev"

[services.env]
PORT = "24465"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/nirdeshika-portfolio", "run", "build"]
publicDir = "artifacts/nirdeshika-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
